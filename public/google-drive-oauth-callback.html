<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Drive Authentication</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f5f5f5;
      }

      .container {
        text-align: center;
        padding: 2rem;
      }

      .spinner {
        border: 3px solid rgba(0, 0, 0, 0.1);
        border-top: 3px solid #3b82f6;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      .message {
        color: #6b7280;
        font-size: 14px;
      }

      .error {
        color: #ef4444;
        font-weight: 500;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="spinner"></div>
      <div class="message" id="status">Completing authentication...</div>
    </div>

    <script>
      (async function () {
        // Function to fetch user email using the access token
        const fetchUserEmail = async (accessToken) => {
          try {
            const response = await fetch("https://www.googleapis.com/oauth2/v2/userinfo", {
              headers: {
                Authorization: `Bearer ${accessToken}`,
              },
            });

            if (!response.ok) {
              console.error("Failed to fetch user info:", response.statusText);
              return null;
            }

            const userInfo = await response.json();
            return userInfo.email || null;
          } catch (error) {
            console.error("Error fetching user email:", error);
            return null;
          }
        };

        const statusEl = document.getElementById("status");

        try {
          // Extract token from URL hash
          // Google returns: #access_token=xxx&token_type=Bearer&expires_in=3599&scope=...&state=google_drive_oauth
          const hash = window.location.hash.substring(1);
          const params = new URLSearchParams(hash);

          const accessToken = params.get("access_token");
          const expiresIn = parseInt(params.get("expires_in") || "3600");
          const state = params.get("state");
          const scope = params.get("scope") || "";
          const error = params.get("error");

          // Validate this is a Google Drive OAuth callback
          if (state !== "google_drive_oauth") {
            statusEl.textContent = "Error: Invalid authentication state";
            statusEl.className = "message error";
            if (window.opener) {
              setTimeout(() => window.close(), 2000);
            } else {
              setTimeout(() => {
                window.location.href = window.location.origin + "?error=invalid_state";
              }, 2000);
            }
            return;
          }

          if (!scope.includes("drive.appdata")) {
            statusEl.textContent = "Error: Invalid permissions";
            statusEl.className = "message error";
            if (window.opener) {
              setTimeout(() => window.close(), 2000);
            } else {
              setTimeout(() => {
                window.location.href = window.location.origin + "?error=invalid_permissions";
              }, 2000);
            }
            return;
          }

          // Handle OAuth error
          if (error) {
            const errorDescription = params.get("error_description") || "Authentication failed";

            if (window.opener) {
              window.opener.postMessage(
                {
                  type: "GOOGLE_DRIVE_OAUTH_ERROR",
                  errorCode: "GOOGLE_DRIVE_AUTH_FAILED",
                  errorDescription: errorDescription,
                },
                window.location.origin,
              );

              statusEl.textContent = "Error: " + errorDescription;
              statusEl.className = "message error";
              setTimeout(() => window.close(), 2000);
            } else {
              statusEl.textContent = "Error: " + errorDescription;
              statusEl.className = "message error";
              setTimeout(() => {
                window.location.href = window.location.origin + "?error=" + encodeURIComponent(errorDescription);
              }, 2000);
            }
            return;
          }

          // Handle missing token
          if (!accessToken) {
            if (window.opener) {
              window.opener.postMessage(
                {
                  type: "GOOGLE_DRIVE_OAUTH_ERROR",
                  errorCode: "GOOGLE_DRIVE_NO_ACCESS_TOKEN",
                  errorDescription: "No access token received from Google",
                },
                window.location.origin,
              );

              statusEl.textContent = "Error: No access token received";
              statusEl.className = "message error";
              setTimeout(() => window.close(), 2000);
            } else {
              statusEl.textContent = "Error: No access token received";
              statusEl.className = "message error";
              setTimeout(() => {
                window.location.href = window.location.origin + "?error=no_access_token";
              }, 2000);
            }
            return;
          }

          // Verify this was opened by parent window
          if (!window.opener) {
            // Fetch email and store token BEFORE redirecting
            const email = await fetchUserEmail(accessToken);
            // Calculate expiry with 5 minute buffer (must match TOKEN_EXPIRY_BUFFER in useGoogleCloud.ts)
            const TOKEN_EXPIRY_BUFFER = 5 * 60 * 1000; // 5 minutes buffer before actual expiry
            const expiresAt = Date.now() + expiresIn * 1000 - TOKEN_EXPIRY_BUFFER;
            const tokenData = {
              accessToken,
              expiresAt,
              timestamp: Date.now(),
              email: email, // Can be null if email fetch fails
            };
            // Storage key must match TOKEN_STORAGE_KEY in useGoogleCloud.ts
            localStorage.setItem("google_drive_token", JSON.stringify(tokenData));

            statusEl.textContent = "Authentication successful! Redirecting...";
            setTimeout(() => {
              window.location.href = window.location.origin;
            }, 500);
            return;
          }

          window.opener.postMessage(
            {
              type: "GOOGLE_DRIVE_OAUTH_SUCCESS",
              accessToken: accessToken,
              expiresIn: expiresIn,
            },
            window.location.origin,
          );

          statusEl.textContent = "Authentication successful!";

          // Close popup
          setTimeout(() => window.close(), 300);
        } catch (err) {
          const errorMessage = err.message || "Unknown error";

          if (window.opener) {
            window.opener.postMessage(
              {
                type: "GOOGLE_DRIVE_OAUTH_ERROR",
                errorCode: "GOOGLE_DRIVE_AUTH_FAILED",
                errorDescription: errorMessage,
              },
              window.location.origin,
            );

            statusEl.textContent = "Error: " + errorMessage;
            statusEl.className = "message error";
            setTimeout(() => window.close(), 2000);
          } else {
            statusEl.textContent = "Error: " + errorMessage;
            statusEl.className = "message error";
            setTimeout(() => {
              window.location.href = window.location.origin + "?error=" + encodeURIComponent(errorMessage);
            }, 2000);
          }
        }
      })();
    </script>
  </body>
</html>
